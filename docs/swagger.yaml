openapi: 3.0.3

info:
  title: Расчет себестоимости при позаказном производстве
  description: API для загрузки CSV, расчета себестоимости, работы с заказами, авторизации и формирования отчетов.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Локальный сервер

tags:
  - name: Auth
    description: Регистрация и авторизация пользователей
  - name: Uploads
    description: Загрузка CSV-файлов
  - name: Orders
    description: Заказы и данные по заказам
  - name: Calculations
    description: Расчеты по CSV-файлам
  - name: Reports
    description: Формирование и скачивание отчетов
  - name: Mocks
    description: Тестовые данные

paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Зарегистрировать пользователя
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '201':
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateEntityResponse'
        '400':
          $ref: '#/components/responses/BadRequestText'
        '409':
          $ref: '#/components/responses/ConflictText'
        '500':
          $ref: '#/components/responses/InternalServerErrorText'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Получить JWT-токен
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Авторизация выполнена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequestText'
        '401':
          $ref: '#/components/responses/UnauthorizedText'
        '500':
          $ref: '#/components/responses/InternalServerErrorText'

  /upload:
    post:
      tags: [Uploads]
      summary: Загрузить CSV-файл в базу данных
      description: Загружает один CSV-файл типа boms, labor или overhead. Требуется JWT-токен.
      operationId: uploadFile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [type, file]
              properties:
                type:
                  type: string
                  enum: [boms, labor, overhead]
                  description: Тип загружаемых данных
                file:
                  type: string
                  format: binary
                  description: CSV-файл
      responses:
        '200':
          description: Файл успешно загружен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          $ref: '#/components/responses/BadRequestText'
        '401':
          $ref: '#/components/responses/UnauthorizedText'
        '405':
          $ref: '#/components/responses/MethodNotAllowedText'
        '500':
          $ref: '#/components/responses/InternalServerErrorText'

  /orders:
    get:
      tags: [Orders]
      summary: Получить список заказов
      operationId: getOrders
      responses:
        '200':
          description: Список заказов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorText'
    post:
      tags: [Orders]
      summary: Создать заказ
      operationId: createOrder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Заказ создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateEntityResponse'
        '400':
          $ref: '#/components/responses/BadRequestText'
        '401':
          $ref: '#/components/responses/UnauthorizedText'
        '409':
          $ref: '#/components/responses/ConflictText'
        '500':
          $ref: '#/components/responses/InternalServerErrorText'

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Получить заказ по ID
      operationId: getOrderById
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Данные заказа
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequestText'
        '404':
          $ref: '#/components/responses/NotFoundText'
        '500':
          $ref: '#/components/responses/InternalServerErrorText'

  /orders/{id}/cost/{method}:
    get:
      tags: [Orders]
      summary: Рассчитать себестоимость заказа
      operationId: getOrderCost
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - name: method
          in: path
          required: true
          schema:
            type: string
            enum: [bom, labor]
          description: Метод распределения накладных расходов
      responses:
        '200':
          description: Себестоимость заказа
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostResponse'
        '400':
          $ref: '#/components/responses/BadRequestText'
        '500':
          $ref: '#/components/responses/InternalServerErrorText'

  /orders/{id}/changes:
    get:
      tags: [Orders]
      summary: Получить историю загрузок по заказу
      operationId: getOrderChanges
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Журнал изменений заказа
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UploadLog'
        '400':
          $ref: '#/components/responses/BadRequestText'
        '500':
          $ref: '#/components/responses/InternalServerErrorText'

  /orders/{id}/boms:
    get:
      tags: [Orders]
      summary: Получить BOM-позиции заказа
      operationId: getOrderBoms
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: BOM-позиции заказа
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BOMItemResponse'
        '400':
          $ref: '#/components/responses/BadRequestText'
        '500':
          $ref: '#/components/responses/InternalServerErrorText'

  /orders/{id}/labor:
    get:
      tags: [Orders]
      summary: Получить трудозатраты заказа
      operationId: getOrderLabor
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Трудозатраты заказа
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LaborItemResponse'
        '400':
          $ref: '#/components/responses/BadRequestText'
        '500':
          $ref: '#/components/responses/InternalServerErrorText'

  /orders/{id}/overhead:
    get:
      tags: [Orders]
      summary: Получить накладные расходы заказа
      operationId: getOrderOverhead
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Накладные расходы заказа
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OverheadItemResponse'
        '400':
          $ref: '#/components/responses/BadRequestText'
        '500':
          $ref: '#/components/responses/InternalServerErrorText'

  /api/calculate:
    post:
      tags: [Calculations]
      summary: Рассчитать себестоимость по трем CSV-файлам
      description: Выполняет расчет по BOM, Labor и Overhead, сохраняет расчет и возвращает его ID. Требуется JWT-токен.
      operationId: calculateFromFiles
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [bom, labor, overhead]
              properties:
                bom:
                  type: string
                  format: binary
                  description: CSV-файл состава заказа
                labor:
                  type: string
                  format: binary
                  description: CSV-файл трудозатрат
                overhead:
                  type: string
                  format: binary
                  description: CSV-файл накладных расходов
      responses:
        '200':
          description: Расчет выполнен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculationResult'
        '400':
          $ref: '#/components/responses/BadRequestText'
        '401':
          $ref: '#/components/responses/UnauthorizedText'
        '405':
          $ref: '#/components/responses/MethodNotAllowedText'
        '500':
          $ref: '#/components/responses/InternalServerErrorText'

  /reports/generate:
    post:
      tags: [Reports]
      summary: Запросить отчет у внешней системы 1С
      description: Берет сохраненный расчет, отправляет его в 1С, сохраняет ответ и возвращает Excel-файл. Требуется JWT-токен.
      operationId: generateReport
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateReportRequest'
      responses:
        '200':
          description: Excel-файл отчета
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename=report.xlsx
            X-Report-ID:
              schema:
                type: integer
              description: ID сохраненного отчета
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequestText'
        '401':
          $ref: '#/components/responses/UnauthorizedText'
        '404':
          $ref: '#/components/responses/NotFoundText'
        '405':
          $ref: '#/components/responses/MethodNotAllowedText'
        '502':
          $ref: '#/components/responses/BadGatewayText'
        '500':
          $ref: '#/components/responses/InternalServerErrorText'

  /reports/{id}/excel:
    get:
      tags: [Reports]
      summary: Скачать Excel-файл сохраненного отчета
      operationId: downloadReportExcel
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: ID отчета
      responses:
        '200':
          description: Excel-файл отчета
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename=report.xlsx
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequestText'
        '401':
          $ref: '#/components/responses/UnauthorizedText'
        '404':
          $ref: '#/components/responses/NotFoundText'
        '500':
          $ref: '#/components/responses/InternalServerErrorText'

  /mocks/orders:
    get:
      tags: [Mocks]
      summary: Получить тестовый список заказов
      operationId: getMockOrders
      responses:
        '200':
          description: Тестовые заказы
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MockOrder'

  /mocks/orders/{id}/cost:
    get:
      tags: [Mocks]
      summary: Получить тестовую себестоимость заказа
      operationId: getMockOrderCost
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Тестовая себестоимость заказа
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockOrderCost'
        '400':
          $ref: '#/components/responses/BadRequestText'
        '404':
          $ref: '#/components/responses/NotFoundText'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: Идентификатор заказа

  responses:
    BadRequestText:
      description: Некорректный запрос
      content:
        text/plain:
          schema:
            type: string
    UnauthorizedText:
      description: Требуется авторизация или передан неверный токен
      content:
        text/plain:
          schema:
            type: string
    NotFoundText:
      description: Объект не найден
      content:
        text/plain:
          schema:
            type: string
    ConflictText:
      description: Конфликт данных
      content:
        text/plain:
          schema:
            type: string
    MethodNotAllowedText:
      description: Метод не поддерживается
      content:
        text/plain:
          schema:
            type: string
    BadGatewayText:
      description: Ошибка внешнего сервиса
      content:
        text/plain:
          schema:
            type: string
    InternalServerErrorText:
      description: Внутренняя ошибка сервера
      content:
        text/plain:
          schema:
            type: string

  schemas:
    AuthRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: password123

    StatusResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    CreateEntityResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        id:
          type: integer
          example: 101

    LoginResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        token:
          type: string
          description: JWT-токен для заголовка Authorization: Bearer {token}

    CreateOrderRequest:
      type: object
      required: [id, start_date, status]
      properties:
        id:
          type: integer
          example: 101
        start_date:
          type: string
          format: date
          example: '2026-03-09'
        end_date:
          type: string
          format: date
          nullable: true
          example: '2026-03-10'
        status:
          type: string
          example: created

    OrderResponse:
      type: object
      properties:
        id:
          type: integer
          example: 101
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
          nullable: true
        total_cost:
          type: number
          format: double
          example: 126.25
        status:
          type: string
          example: created
        error_id:
          type: integer
          nullable: true

    CostResponse:
      type: object
      properties:
        materials:
          type: number
          format: double
          example: 80.5
        labor:
          type: number
          format: double
          example: 30
        overhead:
          type: number
          format: double
          example: 15.75
        total:
          type: number
          format: double
          example: 126.25

    CalculationResult:
      type: object
      properties:
        calculationId:
          type: integer
          example: 1
        bomCost:
          type: number
          format: double
          example: 80.5
        laborCost:
          type: number
          format: double
          example: 30
        overheadCost:
          type: number
          format: double
          example: 15.75
        totalCost:
          type: number
          format: double
          example: 126.25

    BOMItemResponse:
      type: object
      properties:
        id:
          type: integer
        order_id:
          type: integer
        quantity:
          type: number
          format: double
        unit_cost:
          type: number
          format: double
        material_code:
          type: string

    LaborItemResponse:
      type: object
      properties:
        id:
          type: integer
        order_id:
          type: integer
        rate:
          type: number
          format: double
        hours:
          type: number
          format: double

    OverheadItemResponse:
      type: object
      properties:
        id:
          type: integer
        order_id:
          type: integer
        date:
          type: string
          example: '2026-03-09'
        prod_type:
          type: string
        amount:
          type: number
          format: double

    UploadLog:
      type: object
      properties:
        id:
          type: integer
        order_id:
          type: integer
        file_type:
          type: string
          enum: [boms, labor, overhead]
        uploaded_at:
          type: string
          format: date-time
        changed_by:
          type: string

    GenerateReportRequest:
      type: object
      required: [calculation_id]
      properties:
        calculation_id:
          type: integer
          description: ID сохраненного расчета
          example: 1
        calculationId:
          type: integer
          description: Альтернативное имя поля, которое также поддерживается сервером
          example: 1

    ReportRequest:
      type: object
      properties:
        status:
          type: string
          example: ok
        date:
          type: array
          items:
            $ref: '#/components/schemas/ReportItem'

    ReportItem:
      type: object
      properties:
        order:
          type: string
          example: '101'
        type:
          type: string
          example: materials
        sum:
          type: number
          format: double
          example: 80.5

    MockOrder:
      type: object
      properties:
        id:
          type: integer
        start_date:
          type: string
          example: 09-03-2026
        end_date:
          type: string
          example: 10-03-2026
        total_cost:
          type: integer
        status:
          type: string
        error_id:
          type: integer
          nullable: true

    MockOrderCost:
      type: object
      properties:
        order_id:
          type: integer
        materials:
          type: number
          format: double
        labor:
          type: number
          format: double
        overhead:
          type: number
          format: double
        total:
          type: number
          format: double
